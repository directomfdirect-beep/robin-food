<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 16px;
      font-size: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connected { background: #2DB87A; }
    .dot.error { background: #FF5459; }
    .status { font-weight: 600; font-size: 11px; }
    .log {
      background: #111;
      border-radius: 6px;
      padding: 8px;
      height: 120px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.6;
      color: #aaa;
    }
    .log .ok { color: #2DB87A; }
    .log .err { color: #FF5459; }
    .log .info { color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <span class="status" id="status">Connecting...</span>
  </div>
  <div class="log" id="log"></div>

  <script>
    const SERVER = 'http://localhost:3333';
    const dot = document.getElementById('dot');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    let connected = false;
    let cmdCount = 0;

    function log(msg, type = 'info') {
      const line = document.createElement('div');
      line.className = type;
      line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(ok) {
      connected = ok;
      dot.className = 'dot ' + (ok ? 'connected' : 'error');
      statusEl.textContent = ok ? 'Bridge connected' : 'Bridge offline';
    }

    // Receive results from main plugin thread and forward to server
    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (!msg || msg.type !== 'result') return;

      try {
        await fetch(SERVER + '/result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: msg.id, result: msg.result, error: msg.error }),
        });
        if (msg.error) {
          log(`#${msg.id} error: ${msg.error}`, 'err');
        } else {
          log(`#${msg.id} done`, 'ok');
        }
      } catch (e) {
        log('Failed to post result: ' + e.message, 'err');
      }
    };

    // Poll the bridge server for new commands
    async function poll() {
      try {
        const res = await fetch(SERVER + '/poll');
        const cmd = await res.json();

        if (!connected) {
          setStatus(true);
          log('Bridge connected', 'ok');
        }

        if (cmd && cmd.id && cmd.code) {
          cmdCount++;
          log(`#${cmd.id} received (${cmd.code.length} chars)`, 'info');
          // Forward to main plugin thread for execution
          parent.postMessage({ pluginMessage: { type: 'exec', id: cmd.id, code: cmd.code } }, '*');
        }
      } catch (e) {
        if (connected) {
          setStatus(false);
          log('Bridge offline: ' + e.message, 'err');
        }
      }

      // Poll every 800ms
      setTimeout(poll, 800);
    }

    // Start polling
    poll();
  </script>
</body>
</html>
